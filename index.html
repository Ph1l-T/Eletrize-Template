    <script>
      (function () {
        const CLOUDFLARE_BEACON_HOST = "static.cloudflareinsights.com/beacon";

        function suppressCloudflareWarning(event) {
          const target = event.target || {};
          const origin =
            (typeof target.src === "string" && target.src) ||
            (typeof event.filename === "string" && event.filename) ||
            "";

          if (!origin || !origin.includes(CLOUDFLARE_BEACON_HOST)) {
            return;
          }

          if (typeof event.preventDefault === "function") {
            event.preventDefault();
          }
          if (typeof event.stopImmediatePropagation === "function") {
            event.stopImmediatePropagation();
          }

          if (!window.__cfBeaconWarningShown) {
            window.__cfBeaconWarningShown = true;
            console.info(
              "Cloudflare Insights não pôde ser carregado (uso offline ou script bloqueado). Nenhuma ação adicional é necessária.",
            );
          }
        }

        function removeScenesPreload() {
          document
            .querySelectorAll('link[rel="preload"][href*="scenes.js"]')
            .forEach((link) => link.remove());
        }

        window.addEventListener("error", suppressCloudflareWarning, true);

        if (document.readyState === "loading") {
          document.addEventListener("DOMContentLoaded", removeScenesPreload);
        } else {
          removeScenesPreload();
        }
      })();
    </script>

    <script>
      // Garantir que a animação de inicialização rode imediatamente
      document.addEventListener("DOMContentLoaded", function () {
        const loader = document.getElementById("global-loader");
        const loaderContent = loader?.querySelector(".loader-content");

        if (loaderContent) {
          // Remover e readicionar a animação para garantir que rode
          loaderContent.style.animation = "none";
          void loaderContent.offsetWidth; // Forçar reflow
          loaderContent.style.animation = "0.6s ease-out fadeInUp";
        }
      });

      // Fallback para garantir que o loader seja visível mesmo se houver erro
      if (document.readyState !== "loading") {
        const loader = document.getElementById("global-loader");
        const loaderContent = loader?.querySelector(".loader-content");
        if (loaderContent) {
          loaderContent.style.animation = "0.6s ease-out fadeInUp";
        }
      }
    </script>

    <script>
      (function () {
        var originalConsole = window.__DASHBOARD_ORIGINAL_CONSOLE__ || {
          log: console.log ? console.log.bind(console) : function () {},
          info: console.info ? console.info.bind(console) : function () {},
          debug: console.debug ? console.debug.bind(console) : function () {},
        };

        function parseDebugFromQuery() {
          try {
            var params = new URLSearchParams(window.location.search);
            return params.get("debug") === "1";
          } catch (error) {
            return false;
          }
        }

        function readDebugFromStorage() {
          try {
            return window.localStorage.getItem("dashboard_debug") === "1";
          } catch (error) {
            return false;
          }
        }

        function setConsoleState(enabled) {
          if (enabled) {
            if (!window.__DASHBOARD_ORIGINAL_CONSOLE__) {
              window.__DASHBOARD_ORIGINAL_CONSOLE__ = originalConsole;
            }

            Object.keys(originalConsole).forEach(function (method) {
              if (originalConsole[method]) {
                console[method] = originalConsole[method];
              }
            });
            return;
          }

          var noop = function () {};
          ["log", "info", "debug"].forEach(function (method) {
            if (typeof console[method] === "function") {
              console[method] = noop;
            }
          });
        }

        window.setDashboardDebug = function (enabled, persist) {
          if (persist) {
            try {
              window.localStorage.setItem(
                "dashboard_debug",
                enabled ? "1" : "0",
              );
            } catch (error) {}
          }

          window.__DASHBOARD_DEBUG__ = Boolean(enabled);
          setConsoleState(window.__DASHBOARD_DEBUG__);
        };

        window.__DASHBOARD_DEBUG__ =
          parseDebugFromQuery() || readDebugFromStorage();

        setConsoleState(window.__DASHBOARD_DEBUG__);
      })();
    </script>

    <script>
      // Função temporária updateProgress até script.js carregar
      window.updateProgress =
        window.updateProgress ||
        function (percentage, text) {
          try {
            const progressFill = document.getElementById("progress-fill");
            const progressText = document.getElementById("progress-text");
            const loaderText = document.querySelector(".loader-text");

            if (progressFill) {
              progressFill.style.width = percentage + "%";
            }

            if (progressText) {
              progressText.textContent = Math.round(percentage) + "%";
            }

            if (loaderText && text) {
              loaderText.textContent = text;
            }

            console.log(
              `📊 Progresso: ${percentage}% - ${text || "Carregando..."}`,
            );
          } catch (error) {
            console.warn("⚠️ Erro ao atualizar progresso:", error);
          }
        };

      // PWA: registra service worker (desativado em localhost para evitar cache no desenvolvimento)

      if ("serviceWorker" in navigator) {
        const isLocalhost = ["localhost", "127.0.0.1", "::1"].includes(
          location.hostname,
        );

        if (isLocalhost) {
          // Em ambiente de desenvolvimento, garantir remoção do SW e dos caches

          navigator.serviceWorker
            .getRegistrations?.()
            .then((regs) => regs.forEach((r) => r.unregister()))
            .catch(() => {});

          if (window.caches?.keys) {
            caches
              .keys()
              .then((keys) => Promise.all(keys.map((k) => caches.delete(k))))
              .catch(() => {});
          }
        } else {
          window.addEventListener("load", function () {
            navigator.serviceWorker
              .register("service-worker.js")
              .catch(() => {});
          });
        }
      }

      // --- SPA Core ---

      const spaRoot = document.getElementById("spa-root");
      const pageCache = new Map();

      // --- UI tokens vindos do config.js (ícone + label) ---
      function uiItem(key, fallback) {
        try {
          if (typeof getUiItem === "function") {
            return getUiItem(key) || fallback || null;
          }
        } catch (e) {}
        return fallback || null;
      }

      function uiLabel(key, fallback) {
        const item = uiItem(key, null);
        return (item && item.label) || fallback || "";
      }

      function uiIcon(key, fallback) {
        const item = uiItem(key, null);
        return (item && item.icon) || fallback || "";
      }

      function uiToggleIcon(key, state, fallback) {
        try {
          if (typeof getUiToggleIcon === "function") {
            return getUiToggleIcon(key, state) || fallback || "";
          }
        } catch (e) {}
        return fallback || "";
      }

      function uiActionIcon(key, fallback) {
        try {
          if (typeof getUiActionIcon === "function") {
            return getUiActionIcon(key) || fallback || "";
          }
        } catch (e) {}
        return fallback || "";
      }

      // --- Bottom Nav component (100% config-driven) ---
      let bottomNavLocalActiveId = "";
      let bottomNavScrollListenerBound = false;
      let bottomNavScrollRaf = 0;
      let bottomNavPendingScrollSource = null;
      let bottomNavPendingScrollY = 0;
      let bottomNavLastScrollAnchor = 0;
      let bottomNavLastScrollSource = null;
      let bottomNavCollapseClickBound = false;
      let bottomNavBubbleSyncRaf = 0;
      let bottomNavBubbleSyncTimeouts = [];

      function getBottomNavConfigSafe() {
        try {
          if (typeof getBottomNavConfig === "function") {
            const cfg = getBottomNavConfig();
            if (cfg && typeof cfg === "object") return cfg;
          }
        } catch (e) {}

        try {
          if (
            window.bottomNavConfig &&
            typeof window.bottomNavConfig === "object"
          ) {
            return window.bottomNavConfig;
          }
        } catch (e) {}

        return null;
      }

      function normalizeBottomNavRoute(value) {
        const raw = String(value || "").trim();
        if (!raw) return "";
        return raw.replace(/^#/, "").replace(/^\/+/, "");
      }

      function getBottomNavItems(config = getBottomNavConfigSafe()) {
        if (!config || !Array.isArray(config.items)) return [];

        return config.items
          .filter((item) => item && item.visible !== false)
          .sort((a, b) => {
            const orderA = Number.isFinite(Number(a?.order))
              ? Number(a.order)
              : Number.MAX_SAFE_INTEGER;
            const orderB = Number.isFinite(Number(b?.order))
              ? Number(b.order)
              : Number.MAX_SAFE_INTEGER;

            if (orderA !== orderB) return orderA - orderB;
            return String(a?.label || "").localeCompare(String(b?.label || ""));
          });
      }

      function resolveBottomNavIcon(iconPath) {
        const icon = String(iconPath || "").trim();
        if (!icon) return "";

        try {
          if (typeof resolveIconPath === "function") {
            return resolveIconPath(icon) || icon;
          }
        } catch (e) {}

        return icon;
      }

      function shouldShowBottomNav(config) {
        if (!config || config.enabled === false) return false;

        const breakpoint = Number.parseInt(config.breakpoint, 10);
        const showOnDesktop = config.showOnDesktop === true;
        if (showOnDesktop) return true;

        if (typeof window.matchMedia === "function") {
          if (
            Number.isFinite(breakpoint) &&
            window.matchMedia(`(max-width: ${breakpoint}px)`).matches
          ) {
            return true;
          }

          const showOnLandscapeMobile = config.showOnLandscapeMobile !== false;
          if (showOnLandscapeMobile) {
            const landscapeMaxHeight = Number.parseInt(
              config.landscapeMaxHeight,
              10,
            );
            const landscapeMaxWidth = Number.parseInt(
              config.landscapeMaxWidth,
              10,
            );
            const isLandscape = window.matchMedia(
              "(orientation: landscape)",
            ).matches;

            const heightOk =
              !Number.isFinite(landscapeMaxHeight) ||
              window.innerHeight <= landscapeMaxHeight;
            const widthOk =
              !Number.isFinite(landscapeMaxWidth) ||
              window.innerWidth <= landscapeMaxWidth;

            if (isLandscape && heightOk && widthOk) {
              return true;
            }
          }

          return false;
        }

        if (Number.isFinite(breakpoint) && window.innerWidth <= breakpoint) {
          return true;
        }

        if (config.showOnLandscapeMobile !== false) {
          const landscapeMaxHeight = Number.parseInt(
            config.landscapeMaxHeight,
            10,
          );
          const landscapeMaxWidth = Number.parseInt(
            config.landscapeMaxWidth,
            10,
          );
          const isLandscape = window.innerWidth > window.innerHeight;
          const heightOk =
            !Number.isFinite(landscapeMaxHeight) ||
            window.innerHeight <= landscapeMaxHeight;
          const widthOk =
            !Number.isFinite(landscapeMaxWidth) ||
            window.innerWidth <= landscapeMaxWidth;
          if (isLandscape && heightOk && widthOk) {
            return true;
          }
        }

        return false;
      }

      function getBottomNavScrollY() {
        const y =
          window.pageYOffset ||
          document.documentElement.scrollTop ||
          document.body.scrollTop ||
          0;
        return y > 0 ? y : 0;
      }

      function resolveBottomNavScrollSource(target) {
        if (
          !target ||
          target === window ||
          target === document ||
          target === document.documentElement ||
          target === document.body
        ) {
          return window;
        }

        if (target instanceof Element) {
          return target;
        }

        return window;
      }

      function getBottomNavSourceScrollY(source) {
        const normalizedSource = resolveBottomNavScrollSource(source);
        if (normalizedSource === window) {
          return getBottomNavScrollY();
        }

        const y = Number(normalizedSource.scrollTop || 0);
        return y > 0 ? y : 0;
      }

      function getBottomNavBehavior(config = getBottomNavConfigSafe()) {
        const behavior =
          config && typeof config.behavior === "object" ? config.behavior : {};
        const controlHomeShortcut =
          behavior && typeof behavior.controlHomeShortcut === "object"
            ? behavior.controlHomeShortcut
            : {};

        const parsePositiveNumber = (value, fallback) => {
          const parsed = Number(value);
          if (!Number.isFinite(parsed) || parsed < 0) return fallback;
          return parsed;
        };

        return {
          autoHideOnScroll: behavior.autoHideOnScroll === true,
          autoHideRoutes: Array.isArray(behavior.autoHideRoutes)
            ? Array.from(
                new Set(
                  behavior.autoHideRoutes
                    .map((route) => normalizeBottomNavRoute(route))
                    .filter(Boolean),
                ),
              )
            : [],
          scrollDelta: Math.max(
            1,
            parsePositiveNumber(behavior.scrollDelta, 8),
          ),
          revealAtTop: Math.max(
            0,
            parsePositiveNumber(behavior.revealAtTop, 10),
          ),
          controlHomeShortcutEnabled: controlHomeShortcut.enabled === true,
          controlHomeShortcutDisableAutoHide:
            controlHomeShortcut.disableAutoHide !== false,
        };
      }

      function getBottomNavControlHomeShortcut(
        config = getBottomNavConfigSafe(),
        items = [],
      ) {
        const behavior =
          config && typeof config.behavior === "object" ? config.behavior : {};
        const controlHomeShortcut =
          behavior && typeof behavior.controlHomeShortcut === "object"
            ? behavior.controlHomeShortcut
            : {};

        const normalizeRoutes = (routes) => {
          if (!Array.isArray(routes)) return [];
          const values = routes
            .map((route) => normalizeBottomNavRoute(route))
            .filter(Boolean);
          return Array.from(new Set(values));
        };

        const primaryRoutesFromConfig = normalizeRoutes(
          controlHomeShortcut.primaryRoutes,
        );
        const primaryRoutes =
          primaryRoutesFromConfig.length > 0
            ? primaryRoutesFromConfig
            : Array.from(
                new Set(
                  (Array.isArray(items) ? items : [])
                    .map((item) => normalizeBottomNavRoute(item?.path))
                    .filter(Boolean),
                ),
              );

        return {
          enabled: controlHomeShortcut.enabled === true,
          primaryRoutes,
          homePath: normalizeBottomNavRoute(
            controlHomeShortcut.homePath || "home",
          ),
          homeId: String(controlHomeShortcut.homeId || "home"),
          onlyControlRoutes: controlHomeShortcut.onlyControlRoutes !== false,
          controlRoutePattern: String(
            controlHomeShortcut.controlRoutePattern || "^ambiente\\d+-",
          ),
          includeRoutes: normalizeRoutes(controlHomeShortcut.includeRoutes),
          excludeRoutes: normalizeRoutes(controlHomeShortcut.excludeRoutes),
        };
      }

      function resolveBottomNavHomeItem(items, shortcutConfig) {
        if (!Array.isArray(items) || items.length === 0) return null;

        const byId = items.find(
          (item, index) =>
            getBottomNavItemId(item, index) ===
            String(shortcutConfig.homeId || ""),
        );
        if (byId) return byId;

        const byPath = items.find(
          (item) =>
            normalizeBottomNavRoute(item?.path) ===
            normalizeBottomNavRoute(shortcutConfig.homePath || "home"),
        );
        if (byPath) return byPath;

        const fallbackByHomePath = items.find(
          (item) => normalizeBottomNavRoute(item?.path) === "home",
        );
        if (fallbackByHomePath) return fallbackByHomePath;

        const fallbackByAmbientesPath = items.find(
          (item) => normalizeBottomNavRoute(item?.path) === "ambientes",
        );
        if (fallbackByAmbientesPath) return fallbackByAmbientesPath;

        return items[0] || null;
      }

      function resolveBottomNavRenderModel(
        currentRoute,
        items,
        config = getBottomNavConfigSafe(),
      ) {
        const route = normalizeBottomNavRoute(currentRoute);
        const safeItems = Array.isArray(items) ? items : [];
        const shortcutConfig = getBottomNavControlHomeShortcut(
          config,
          safeItems,
        );
        const homeItem = resolveBottomNavHomeItem(safeItems, shortcutConfig);

        const isPrimaryRoute =
          !route ||
          shortcutConfig.primaryRoutes.includes(route) ||
          route === shortcutConfig.homePath;

        const isExplicitControlRoute =
          shortcutConfig.includeRoutes.includes(route);
        const isExplicitExcludedRoute =
          shortcutConfig.excludeRoutes.includes(route);
        let isControlRoute = isExplicitControlRoute;

        if (!isControlRoute && route) {
          try {
            const controlRouteRegex = new RegExp(
              shortcutConfig.controlRoutePattern,
              "i",
            );
            isControlRoute = controlRouteRegex.test(route);
          } catch (error) {
            isControlRoute = false;
          }
        }

        if (isExplicitExcludedRoute) {
          isControlRoute = false;
        }

        const canUseShortcutByRoute = shortcutConfig.onlyControlRoutes
          ? isControlRoute
          : !isPrimaryRoute;
        const useControlHomeShortcut =
          shortcutConfig.enabled && canUseShortcutByRoute && !!homeItem;

        if (!useControlHomeShortcut) {
          return {
            mode: "full",
            items: safeItems,
            forcedActiveId: "",
          };
        }

        const homeId = getBottomNavItemId(homeItem, 0);

        return {
          mode: "control-home-shortcut",
          items: [homeItem],
          forcedActiveId: homeId,
        };
      }

      function setBottomNavScrollHidden(nav, hidden) {
        if (!nav) return;
        nav.classList.toggle("is-scroll-hidden", hidden);
      }

      function syncBottomNavScrollState(
        config = getBottomNavConfigSafe(),
        source = bottomNavLastScrollSource || window,
        forcedScrollY = null,
      ) {
        const nav = document.getElementById("spa-navbar");
        if (!nav) return;

        const normalizedSource = resolveBottomNavScrollSource(source);
        const currentY =
          forcedScrollY !== null && forcedScrollY !== undefined
            ? Math.max(0, Number(forcedScrollY) || 0)
            : getBottomNavSourceScrollY(normalizedSource);

        if (nav.classList.contains("is-hidden")) {
          setBottomNavScrollHidden(nav, false);
          bottomNavLastScrollAnchor = currentY;
          bottomNavLastScrollSource = normalizedSource;
          return;
        }

        const behavior = getBottomNavBehavior(config);
        const navRoute =
          normalizeBottomNavRoute(nav?.dataset?.currentRoute || "") ||
          normalizeBottomNavRoute(
            (window.location.hash || "").replace(/^#/, ""),
          ) ||
          "home";

        // Home: manter navbar sempre expandida, mesmo com scroll da lista.
        if (navRoute === "home") {
          setBottomNavScrollHidden(nav, false);
          bottomNavLastScrollAnchor = currentY;
          bottomNavLastScrollSource = normalizedSource;
          return;
        }

        if (
          nav.classList.contains("is-control-home-mode") &&
          behavior.controlHomeShortcutEnabled &&
          behavior.controlHomeShortcutDisableAutoHide
        ) {
          setBottomNavScrollHidden(nav, false);
          bottomNavLastScrollAnchor = currentY;
          bottomNavLastScrollSource = normalizedSource;
          return;
        }

        const shouldAutoHideOnThisRoute =
          behavior.autoHideOnScroll || behavior.autoHideRoutes.includes(navRoute);

        if (!shouldAutoHideOnThisRoute) {
          setBottomNavScrollHidden(nav, false);
          bottomNavLastScrollAnchor = currentY;
          bottomNavLastScrollSource = normalizedSource;
          return;
        }

        if (bottomNavLastScrollSource !== normalizedSource) {
          bottomNavLastScrollSource = normalizedSource;
          bottomNavLastScrollAnchor = currentY;
          if (currentY <= behavior.revealAtTop) {
            setBottomNavScrollHidden(nav, false);
          }
          return;
        }

        if (currentY <= behavior.revealAtTop) {
          setBottomNavScrollHidden(nav, false);
          bottomNavLastScrollAnchor = currentY;
          bottomNavLastScrollSource = normalizedSource;
          return;
        }

        const delta = currentY - bottomNavLastScrollAnchor;
        if (delta >= behavior.scrollDelta) {
          setBottomNavScrollHidden(nav, true);
          bottomNavLastScrollAnchor = currentY;
          bottomNavLastScrollSource = normalizedSource;
          return;
        }

        if (delta <= -behavior.scrollDelta) {
          setBottomNavScrollHidden(nav, false);
          bottomNavLastScrollAnchor = currentY;
          bottomNavLastScrollSource = normalizedSource;
        }
      }

      function onBottomNavAnyScroll(event) {
        bottomNavPendingScrollSource = resolveBottomNavScrollSource(
          event?.target,
        );
        bottomNavPendingScrollY = getBottomNavSourceScrollY(
          bottomNavPendingScrollSource,
        );

        if (bottomNavScrollRaf) return;
        bottomNavScrollRaf = window.requestAnimationFrame(() => {
          bottomNavScrollRaf = 0;
          syncBottomNavScrollState(
            getBottomNavConfigSafe(),
            bottomNavPendingScrollSource,
            bottomNavPendingScrollY,
          );
        });
      }

      function ensureBottomNavScrollListener() {
        if (bottomNavScrollListenerBound) return;
        bottomNavScrollListenerBound = true;
        bottomNavLastScrollSource = window;
        bottomNavLastScrollAnchor = getBottomNavScrollY();
        window.addEventListener("scroll", onBottomNavAnyScroll, {
          passive: true,
        });
        document.addEventListener("scroll", onBottomNavAnyScroll, {
          passive: true,
          capture: true,
        });
      }

      function onBottomNavCollapsedClick(event) {
        const nav = event?.currentTarget;
        if (
          !nav ||
          !nav.classList.contains("is-scroll-hidden") ||
          nav.classList.contains("is-control-home-mode")
        ) {
          return;
        }

        event.preventDefault();
        event.stopPropagation();

        setBottomNavScrollHidden(nav, false);
        const source = bottomNavLastScrollSource || window;
        bottomNavLastScrollAnchor = getBottomNavSourceScrollY(source);
      }

      function ensureBottomNavCollapsedClickListener(nav) {
        if (!nav || bottomNavCollapseClickBound) return;
        bottomNavCollapseClickBound = true;
        nav.addEventListener("click", onBottomNavCollapsedClick);
      }

      function applyBottomNavContainerStyles(nav, config, currentRoute) {
        if (!nav || !config) return;

        const containerStyle = config.containerStyle || {};
        const glassStyle = config.glassStyle || {};
        const activeStyle = config.activeStyle || {};
        const behavior = config.behavior || {};
        const controlShortcutStyle =
          behavior && typeof behavior.controlHomeShortcut === "object"
            ? behavior.controlHomeShortcut
            : {};

        const setNavVar = (name, value) => {
          if (value === undefined || value === null || value === "") return;
          nav.style.setProperty(name, String(value));
        };

        setNavVar("--bottom-nav-width", containerStyle.width);
        setNavVar("--bottom-nav-max-width", containerStyle.maxWidth);
        setNavVar("--bottom-nav-height", containerStyle.height);
        setNavVar("--bottom-nav-padding", containerStyle.padding);
        setNavVar("--bottom-nav-bottom-offset", containerStyle.bottomOffset);
        setNavVar("--bottom-nav-gap", containerStyle.itemGap);
        setNavVar("--bottom-nav-item-touch", containerStyle.itemMinTouch);
        setNavVar("--bottom-nav-item-slot-width", containerStyle.itemSlotWidth);
        setNavVar("--bottom-nav-icon-size", containerStyle.iconSize);
        setNavVar("--bottom-nav-label-size", containerStyle.labelSize);
        setNavVar("--bottom-nav-notch-width", containerStyle.notchWidth);
        setNavVar("--bottom-nav-notch-height", containerStyle.notchHeight);

        setNavVar("--bottom-nav-bg", glassStyle.background);
        setNavVar("--bottom-nav-bg-fallback", glassStyle.fallbackBackground);
        setNavVar("--bottom-nav-border", glassStyle.borderColor);
        setNavVar("--bottom-nav-blur", glassStyle.blur);
        setNavVar("--bottom-nav-shadow", glassStyle.shadow);
        setNavVar("--bottom-nav-inner-glow", glassStyle.innerGlow);

        setNavVar("--bottom-nav-highlight-color", activeStyle.highlightColor);
        setNavVar("--bottom-nav-highlight-size", activeStyle.highlightSize);
        setNavVar("--bottom-nav-item-color", activeStyle.textColor);
        setNavVar(
          "--bottom-nav-item-color-active",
          activeStyle.textColorActive,
        );
        setNavVar("--bottom-nav-item-icon", activeStyle.iconTint);
        setNavVar("--bottom-nav-item-icon-active", activeStyle.iconTintActive);
        setNavVar("--bottom-nav-label-weight", activeStyle.labelWeight);
        setNavVar(
          "--bottom-nav-label-weight-active",
          activeStyle.labelWeightActive,
        );
        setNavVar(
          "--bottom-nav-transition-duration",
          activeStyle.transitionDuration,
        );
        setNavVar(
          "--bottom-nav-transition-easing",
          activeStyle.transitionEasing,
        );
        setNavVar("--bottom-nav-icon-pop-scale", activeStyle.iconPopScale);
        setNavVar(
          "--bottom-nav-control-left-offset",
          controlShortcutStyle.leftOffset,
        );
        setNavVar(
          "--bottom-nav-control-bottom-offset",
          controlShortcutStyle.bottomOffset,
        );
        setNavVar("--bottom-nav-control-size", controlShortcutStyle.size);
        setNavVar("--bottom-nav-control-padding", controlShortcutStyle.padding);
        setNavVar(
          "--bottom-nav-control-highlight-size",
          controlShortcutStyle.highlightSize,
        );
        setNavVar(
          "--bottom-nav-control-icon-size",
          controlShortcutStyle.iconSize,
        );
        setNavVar("--bottom-nav-control-bg", controlShortcutStyle.background);
        setNavVar(
          "--bottom-nav-control-bg-fallback",
          controlShortcutStyle.fallbackBackground,
        );
        setNavVar(
          "--bottom-nav-control-border",
          controlShortcutStyle.borderColor,
        );
        setNavVar("--bottom-nav-control-blur", controlShortcutStyle.blur);
        setNavVar("--bottom-nav-control-shadow", controlShortcutStyle.shadow);

        const route = normalizeBottomNavRoute(currentRoute);
        const isHomeRoute = !route || route === "home" || route === "ambientes";

        const root = document.documentElement;
        const contentPadding = isHomeRoute
          ? "0px"
          : String(containerStyle.contentPaddingBottom || "0px");
        const dockSpace = isHomeRoute
          ? "0px"
          : String(containerStyle.dockSpaceBottom || "0px");
        root.style.setProperty(
          "--bottom-nav-content-padding-base",
          contentPadding,
        );
        root.style.setProperty("--bottom-nav-dock-space-base", dockSpace);
      }

      function applyBottomNavItemStyleOverrides(itemEl, styleOverrides) {
        if (!itemEl || !styleOverrides || typeof styleOverrides !== "object") {
          return;
        }

        Object.entries(styleOverrides).forEach(([key, value]) => {
          if (value === undefined || value === null || value === "") return;

          if (key.startsWith("--")) {
            itemEl.style.setProperty(key, String(value));
            return;
          }

          switch (key) {
            case "highlightColor":
              itemEl.style.setProperty(
                "--bottom-nav-item-highlight",
                String(value),
              );
              break;
            case "textColor":
              itemEl.style.setProperty(
                "--bottom-nav-item-color",
                String(value),
              );
              break;
            case "activeTextColor":
              itemEl.style.setProperty(
                "--bottom-nav-item-color-active",
                String(value),
              );
              break;
            case "iconTint":
              itemEl.style.setProperty("--bottom-nav-item-icon", String(value));
              break;
            case "iconTintActive":
              itemEl.style.setProperty(
                "--bottom-nav-item-icon-active",
                String(value),
              );
              break;
          }
        });
      }

      function itemMatchesBottomNavRoute(item, currentRoute) {
        const current = normalizeBottomNavRoute(currentRoute);
        if (!current) return false;

        const candidates = [];
        const mainPath = normalizeBottomNavRoute(item?.path);
        if (mainPath) candidates.push(mainPath);

        if (Array.isArray(item?.matchPaths)) {
          item.matchPaths.forEach((matchPath) => {
            const normalized = normalizeBottomNavRoute(matchPath);
            if (normalized) candidates.push(normalized);
          });
        }

        return candidates.some((candidate) => {
          if (!candidate) return false;
          return (
            current === candidate ||
            current.startsWith(`${candidate}/`) ||
            current.startsWith(`${candidate}-`)
          );
        });
      }

      function resolveBottomNavActiveId(currentRoute, items) {
        if (!Array.isArray(items) || items.length === 0) return "";

        const byRoute = items.find((item) =>
          itemMatchesBottomNavRoute(item, currentRoute),
        );
        if (byRoute) {
          return String(
            byRoute.id || normalizeBottomNavRoute(byRoute.path) || "",
          );
        }

        if (
          bottomNavLocalActiveId &&
          items.some(
            (item) =>
              String(item.id || normalizeBottomNavRoute(item.path) || "") ===
              bottomNavLocalActiveId,
          )
        ) {
          return bottomNavLocalActiveId;
        }

        const homeItem =
          items.find((item) => normalizeBottomNavRoute(item.path) === "home") ||
          items.find(
            (item) => normalizeBottomNavRoute(item.path) === "ambientes",
          ) ||
          items[0];

        return String(
          homeItem?.id || normalizeBottomNavRoute(homeItem?.path) || "",
        );
      }

      function getBottomNavItemId(item, index) {
        return String(
          item?.id || normalizeBottomNavRoute(item?.path) || `item-${index}`,
        );
      }

      function getBottomNavStructureKey(items) {
        return items
          .map((item, index) => {
            const itemId = getBottomNavItemId(item, index);
            return [
              itemId,
              String(item?.label || ""),
              String(item?.icon || ""),
              String(item?.path || ""),
              item?.external ? "1" : "0",
              item?.disabled ? "1" : "0",
            ].join("::");
          })
          .join("|");
      }

      function createBottomNavButton(item, index) {
        const itemId = getBottomNavItemId(item, index);
        const button = document.createElement("button");
        button.type = "button";
        button.className = "nav-item";
        button.dataset.navId = itemId;

        const iconWrapper = document.createElement("span");
        iconWrapper.className = "nav-icon-wrapper";

        const icon = document.createElement("img");
        icon.className = "nav-icon";
        icon.alt = "";
        icon.setAttribute("aria-hidden", "true");
        iconWrapper.appendChild(icon);

        const label = document.createElement("span");
        label.className = "nav-text";

        button.append(iconWrapper, label);
        button.addEventListener("click", () => onBottomNavSelect(item));
        return button;
      }

      function syncBottomNavButtonState(button, item, index, activeId) {
        if (!button || !item) return;

        const itemId = getBottomNavItemId(item, index);
        const isActive = itemId === activeId;
        const isDisabled = item.disabled === true;

        button.dataset.navId = itemId;
        button.dataset.page = normalizeBottomNavRoute(item.path || "");
        button.dataset.external = item.external ? "true" : "false";
        button.classList.toggle("active", isActive);
        button.classList.toggle("is-disabled", isDisabled);
        button.disabled = isDisabled;
        button.setAttribute(
          "aria-label",
          item.ariaLabel || item.label || itemId,
        );

        if (isActive) {
          button.setAttribute("aria-current", "page");
        } else {
          button.removeAttribute("aria-current");
        }

        if (item.tooltip) {
          button.setAttribute("title", item.tooltip);
        } else {
          button.removeAttribute("title");
        }

        const icon = button.querySelector(".nav-icon");
        if (icon) {
          icon.src = resolveBottomNavIcon(item.icon);
        }

        const label = button.querySelector(".nav-text");
        if (label) {
          label.textContent = String(item.label || itemId);
        }

        button.removeAttribute("style");
        applyBottomNavItemStyleOverrides(button, item.styleOverrides);
      }

      function syncBottomNavButtons(nav, items, activeId) {
        const buttons = Array.from(nav.querySelectorAll(".nav-item"));
        buttons.forEach((button, index) => {
          syncBottomNavButtonState(button, items[index], index, activeId);
        });
      }

      function updateBottomNavActiveBubble(nav) {
        if (!nav) return;

        let bubble = nav.querySelector(".nav-active-bubble");
        if (!bubble) {
          bubble = document.createElement("span");
          bubble.className = "nav-active-bubble";
          bubble.setAttribute("aria-hidden", "true");
          nav.insertBefore(bubble, nav.firstChild || null);
        }

        const activeItem = nav.querySelector(".nav-item.active");
        if (!activeItem) return;

        const navRect = nav.getBoundingClientRect();
        const itemRect = activeItem.getBoundingClientRect();
        const centerX = itemRect.left + itemRect.width / 2 - navRect.left;
        nav.style.setProperty("--bottom-nav-active-left", `${centerX}px`);
      }

      function clearBottomNavBubbleSyncQueue() {
        if (bottomNavBubbleSyncRaf) {
          window.cancelAnimationFrame(bottomNavBubbleSyncRaf);
          bottomNavBubbleSyncRaf = 0;
        }

        if (bottomNavBubbleSyncTimeouts.length > 0) {
          bottomNavBubbleSyncTimeouts.forEach((timeoutId) =>
            window.clearTimeout(timeoutId),
          );
          bottomNavBubbleSyncTimeouts = [];
        }
      }

      function scheduleBottomNavBubbleSync(
        nav,
        config = getBottomNavConfigSafe(),
      ) {
        if (!nav) return;
        clearBottomNavBubbleSyncQueue();

        const transitionDuration = Number.parseInt(
          config?.activeStyle?.transitionDuration,
          10,
        );
        const safeDuration = Number.isFinite(transitionDuration)
          ? Math.max(120, transitionDuration)
          : 240;

        const run = () => {
          if (!nav || nav.classList.contains("is-hidden")) return;
          updateBottomNavActiveBubble(nav);
        };

        bottomNavBubbleSyncRaf = window.requestAnimationFrame(() => {
          bottomNavBubbleSyncRaf = 0;
          run();
        });

        [Math.round(safeDuration * 0.5), safeDuration + 28].forEach((delay) => {
          const timeoutId = window.setTimeout(run, delay);
          bottomNavBubbleSyncTimeouts.push(timeoutId);
        });
      }

      function onBottomNavSelect(item) {
        if (!item || item.disabled) return;

        const config = getBottomNavConfigSafe() || {};
        const nav = document.getElementById("spa-navbar");
        setBottomNavScrollHidden(nav, false);
        bottomNavLastScrollAnchor = getBottomNavScrollY();
        bottomNavLastScrollSource = window;

        try {
          if (typeof config.onNavigate === "function") {
            const callbackResult = config.onNavigate(item);
            if (callbackResult === false) return;
          }
        } catch (error) {
          console.warn("BottomNav onNavigate callback falhou:", error);
        }

        const path = normalizeBottomNavRoute(item.path);
        const activeId = String(item.id || path || "");

        if (item.external) {
          const href = String(item.path || "").trim();
          if (href) {
            const target = item.target || "_blank";
            window.open(href, target, "noopener,noreferrer");
          }
          bottomNavLocalActiveId = activeId;
          renderBottomNav(window.location.hash.replace("#", ""));
          return;
        }

        if (!path) {
          bottomNavLocalActiveId = activeId;
          renderBottomNav(window.location.hash.replace("#", ""));
          return;
        }

        bottomNavLocalActiveId = activeId;

        if (typeof window.spaNavigate === "function") {
          window.spaNavigate(path);
          return;
        }

        if (window.location.hash.replace(/^#/, "") !== path) {
          window.location.hash = path;
          return;
        }

        renderBottomNav(path);
      }

      function renderBottomNav(currentRoute) {
        const nav = document.getElementById("spa-navbar");
        if (!nav) return;

        const config = getBottomNavConfigSafe();
        const allItems = getBottomNavItems(config);
        const renderModel = resolveBottomNavRenderModel(
          currentRoute,
          allItems,
          config,
        );
        const items = renderModel.items;
        const isControlHomeMode = renderModel.mode === "control-home-shortcut";
        const isVisible = shouldShowBottomNav(config) && items.length > 0;
        const normalizedCurrentRoute =
          normalizeBottomNavRoute(currentRoute) || "home";

        nav.classList.toggle("is-hidden", !isVisible);
        nav.classList.toggle("is-control-home-mode", isControlHomeMode);
        nav.dataset.currentRoute = normalizedCurrentRoute;
        nav.setAttribute("aria-hidden", isVisible ? "false" : "true");
        nav.setAttribute(
          "aria-label",
          isControlHomeMode ? "Voltar para Home" : "Navegacao principal",
        );
        document.body.classList.toggle("bottom-nav-active", isVisible);

        if (!isVisible) {
          setBottomNavScrollHidden(nav, false);
          nav.classList.remove("is-control-home-mode");
          clearBottomNavBubbleSyncQueue();
          nav.replaceChildren();
          delete nav.dataset.bottomNavStructureKey;
          delete nav.dataset.bottomNavMode;
          bottomNavLastScrollAnchor = getBottomNavScrollY();
          bottomNavLastScrollSource = window;
          return;
        }

        ensureBottomNavScrollListener();
        ensureBottomNavCollapsedClickListener(nav);
        applyBottomNavContainerStyles(nav, config, currentRoute);

        if (isControlHomeMode) {
          setBottomNavScrollHidden(nav, false);
        }

        nav.dataset.bottomNavMode = renderModel.mode;

        const activeId =
          renderModel.forcedActiveId ||
          resolveBottomNavActiveId(currentRoute, items);
        bottomNavLocalActiveId = activeId || bottomNavLocalActiveId;

        const structureKey = `${renderModel.mode}::${getBottomNavStructureKey(items)}`;
        const hasSameStructure =
          nav.dataset.bottomNavStructureKey === structureKey &&
          nav.querySelectorAll(".nav-item").length === items.length;

        if (!hasSameStructure) {
          const fragment = document.createDocumentFragment();
          items.forEach((item, index) => {
            fragment.appendChild(createBottomNavButton(item, index));
          });
          nav.replaceChildren(fragment);
          nav.dataset.bottomNavStructureKey = structureKey;

          requestAnimationFrame(() => {
            syncBottomNavButtons(nav, items, activeId);
            scheduleBottomNavBubbleSync(nav, config);
            syncBottomNavScrollState(config);
          });
          return;
        }

        syncBottomNavButtons(nav, items, activeId);
        requestAnimationFrame(() => {
          scheduleBottomNavBubbleSync(nav, config);
          syncBottomNavScrollState(config);
        });
      }

      const REMOTE_CONTROL_TYPES = new Set([
        "tv",
        "htv",
        "bluray",
        "appletv",
        "clarotv",
        "roku",
      ]);

      function resolveRemoteControlHeading(type, fallback) {
        const key = String(type || "")
          .trim()
          .toLowerCase();
        const label = uiLabel(key, fallback || key.toUpperCase());
        if (!label) return "";
        if (REMOTE_CONTROL_TYPES.has(key)) {
          return `Controle ${label}`;
        }
        return label;
      }

      const ROOM_IMAGE_BASE =
        typeof getEnvironmentPhotoMap === "function"
          ? (() => {
              const map = getEnvironmentPhotoMap();
              if (map && Object.keys(map).length > 0) return map;
              return {};
            })()
          : {};

      function resolveRoomPhotoSpec(value) {
        const raw = String(value || "").trim();
        const hasExtension = /\.[a-z0-9]+$/i.test(raw);
        const looksLikePath = /[\\/]/.test(raw);

        // If config provides a filename with extension (e.g. "photo-x.webp"), treat it as a direct asset.
        if (raw && hasExtension) {
          const url = looksLikePath
            ? raw.replace(/\\/g, "/")
            : `images/Images/${raw}`;
          return { kind: "direct", url, base: raw };
        }

        // Default behavior: treat as "base" and use somente a versão JPG.
        return { kind: "base", base: raw };
      }

      const ROOM_IMAGE_DATA = Object.entries(ROOM_IMAGE_BASE).reduce(
        (acc, [key, rawBase]) => {
          const spec = resolveRoomPhotoSpec(rawBase);

          if (spec.kind === "direct") {
            acc[key] = {
              base: spec.base,
              isDirect: true,
              fallback: spec.url,
              webpSrcset: "",
              defaultWebp: spec.url,
              backgroundWebp: spec.url,
            };
            return acc;
          }

          acc[key] = {
            base: spec.base,
            isDirect: false,
            fallback: `images/Images/${spec.base}.jpg`,
            webpSrcset: "",
            defaultWebp: `images/Images/${spec.base}.jpg`,
            backgroundWebp: `images/Images/${spec.base}.jpg`,
          };

          return acc;
        },
        {},
      );

      const WEBP_SUPPORTED = false;

      function getRoomBackgroundUrl(route) {
        const data = ROOM_IMAGE_DATA[route];
        if (!data) return null;
        return WEBP_SUPPORTED ? data.backgroundWebp : data.fallback;
      }

      const ROOM_BACKGROUND_CACHE = new Map();
      const ROOM_BACKGROUND_PROMISES = new Map();

      function cacheRoomBackground(route, url, { force = false } = {}) {
        if (!route || !url) return;
        if (!ROOM_BACKGROUND_CACHE.has(route) || force) {
          ROOM_BACKGROUND_CACHE.set(route, url);
        }
      }

      function preloadRoomBackground(route) {
        const data = ROOM_IMAGE_DATA[route];
        if (!data) return Promise.resolve(null);
        const targetUrl = getRoomBackgroundUrl(route);
        if (!targetUrl) return Promise.resolve(null);

        if (ROOM_BACKGROUND_CACHE.get(route) === targetUrl) {
          return Promise.resolve(targetUrl);
        }

        if (ROOM_BACKGROUND_PROMISES.has(route)) {
          return ROOM_BACKGROUND_PROMISES.get(route);
        }

        const promise = new Promise((resolve) => {
          const img = new Image();
          img.decoding = "async";
          img.onload = () => {
            cacheRoomBackground(route, targetUrl, { force: true });
            ROOM_BACKGROUND_PROMISES.delete(route);
            resolve(targetUrl);
          };
          img.onerror = () => {
            ROOM_BACKGROUND_PROMISES.delete(route);
            resolve(targetUrl);
          };
          img.src = targetUrl;
        });

        ROOM_BACKGROUND_PROMISES.set(route, promise);
        return promise;
      }

      function applyBackground(container, route) {
        if (!container) return;

        container.dataset.backgroundRoute = route;
        container.classList.remove("page-ready");

        const cached = ROOM_BACKGROUND_CACHE.get(route);
        if (cached) {
          container.style.backgroundImage = `url('${cached}')`;
          container.classList.remove("bg-loading");
          requestAnimationFrame(() => {
            container.classList.add("page-ready");
          });
        } else {
          // Premium UX: evitar mostrar 1 frame "sem fundo" enquanto a imagem baixa.
          // Mostra placeholder (bg-loading) imediatamente, e só faz fade para a foto quando estiver pronta.
          container.style.backgroundImage = "";
          container.classList.add("bg-loading");
          requestAnimationFrame(() => {
            container.classList.add("page-ready");
          });
        }

        preloadRoomBackground(route).then((finalUrl) => {
          if (!finalUrl) {
            container.classList.remove("bg-loading");
            container.classList.add("page-ready");
            return;
          }
          if (container.dataset.backgroundRoute !== route) {
            return;
          }

          const nextBg = `url('${finalUrl}')`;
          const currentBg = container.style.backgroundImage || "";

          // Evitar flash: quando a imagem final chega (webp/otimizada),
          // faz um fade rápido antes de trocar o background.
          if (currentBg !== nextBg) {
            container.classList.remove("page-ready");

            // Dar tempo da opacidade baixar (fade-out) antes de trocar a imagem
            setTimeout(() => {
              if (container.dataset.backgroundRoute !== route) return;
              container.style.backgroundImage = nextBg;
              container.classList.remove("bg-loading");
              requestAnimationFrame(() => {
                if (container.dataset.backgroundRoute !== route) return;
                container.classList.add("page-ready");
              });
            }, 200);
            return;
          }

          container.classList.remove("bg-loading");
          requestAnimationFrame(() => {
            container.classList.add("page-ready");
          });
        });
      }

      function renderRoomResponsivePhoto(route, alt, options = {}) {
        const data = ROOM_IMAGE_DATA[route];
        if (!data) return "";
        const preferredCardUrl = data.fallback;
        cacheRoomBackground(route, preferredCardUrl);
        const {
          eager = false,
          className = "room-card-photo",
          imageClassName = "",
        } = options;
        const loading = eager ? "eager" : "lazy";
        const decoding = eager ? "sync" : "async";
        const fetchPriority = eager ? 'fetchpriority="high"' : "";
        const imgClassAttribute = imageClassName
          ? `class="${imageClassName}"`
          : "";

        return `
          <picture class="${className}" data-route="${route}">
            <img
              ${imgClassAttribute}
              src="${data.fallback}"
              alt="${alt}"
              loading="${loading}"
              decoding="${decoding}"
              ${fetchPriority}
              width="720"
              height="540"
            />
          </picture>
        `;

        if (!env) return [];
        const list = Array.isArray(env[prop]) ? env[prop] : [];
        return list
          .map((item) => {
            if (!item || !item.id) return null;
            const baseId = String(item.id);
            return {
              id: baseId,
              name: item.name || "",
              metadataId: item.metadataDeviceId || item.metadataId || baseId,
              transportId: item.transportDeviceId || item.transportId || baseId,
              volumeId: item.volumeDeviceId || item.volumeId || baseId,
              powerId: item.powerDeviceId || item.powerId || baseId,
              controlId: item.controlDeviceId || item.controlId || baseId,
              receiverId: item.receiverDeviceId || item.receiverId || "",
              displayId: item.displayDeviceId || item.displayId || "",
              inputId: item.inputDeviceId || item.inputId || "",
            };
          })
          .filter(Boolean);

        if (!ac) {

        }

        const zones = Array.isArray(ac.zones) ? ac.zones : [];
        const controls = ac.controls || {};
        const showZones = !!controls.zoneSelector;
        const showAletas = !!controls.aletas;
        const showWindfree = !!controls.windfree;

        const tempConfig = ac.temperature || {};
        const minTemp = Number.isFinite(tempConfig.min) ? tempConfig.min : 18;
        const maxTemp = Number.isFinite(tempConfig.max) ? tempConfig.max : 25;
        const defaultTemp = Number.isFinite(tempConfig.default)
          ? tempConfig.default
          : 22;
        const safeDefaultTemp = Math.min(
          maxTemp,
          Math.max(minTemp, defaultTemp),
        );
        const acDeviceId = ac?.deviceId ? String(ac.deviceId) : "";
        const firstZoneDeviceId =
          zones.length && zones[0]?.deviceId ? String(zones[0].deviceId) : "";
        const defaultDeviceId = acDeviceId || firstZoneDeviceId;

        let zoneRow = "";
        if (showZones) {
          if (!zones.length) {
            zoneRow = `
              <div class="acv2-row acv2-row--empty">
                <div class="acv2-empty">Defina <strong>zones</strong> no config.js.</div>
              </div>
            `;
          } else {
            const zoneButtons = zones
              .map((zone, index) => {
                const label = String(index + 1);
                const ariaLabel = zone.name || `Zona ${index + 1}`;
                const deviceId =
                  acDeviceId || (zone.deviceId ? String(zone.deviceId) : "");
                return `
                  <button type="button" class="acv2-btn acv2-zone-btn" data-zone-button data-zone-ids="${deviceId}" aria-pressed="false" aria-label="${ariaLabel}">
                    ${label}
                  </button>

              .join("");

            const allIds = zones
              .map(
                (zone) =>
                  acDeviceId || (zone?.deviceId ? String(zone.deviceId) : ""),

            const allButton = uniqueAllIds.length
              ? `

                  Ambas
                </button>
              `
              : "";

            zoneRow = `
              <div class="acv2-row acv2-row--zones">
                ${zoneButtons}
                ${allButton}
              </div>
            `;
          }
        }

        let aletaRow = "";
        if (showAletas) {
          const windfreeButton = showWindfree
            ? `

                <span>Parada</span>
              </button>
            </div>
          `;
        }

        const comfortLabel = uiLabel("comfort", "Ar Condicionado");

        return `

          <div class="page active page-container ${envKey}-page ${envKey}-conforto-page">

            <div class="ac-page-wrapper">
              <main class="ac-container acv2-container" data-component="ac-control" data-power-off="true" data-temp-min="${minTemp}" data-temp-max="${maxTemp}" data-temp-default="${safeDefaultTemp}" data-device-id="${defaultDeviceId}">

                    <span class="acv2-title-line"></span>

                      <span class="acv2-temp-value" data-role="temp-current">${safeDefaultTemp}</span>
                      <span class="acv2-temp-unit">C</span>

                    <div class="acv2-temp-side-actions">
                      <button type="button" class="acv2-btn acv2-btn--icon acv2-temp-side-btn acv2-temp-side-btn--increase" data-role="temp-increase" aria-label="Aumentar temperatura">

                    <div class="acv2-temp-buttons acv2-temp-buttons--commands">

      function collectConfigDrivenRoutes() {
        if (typeof getVisibleEnvironments !== "function") {
          return [];
        }

        const routes = new Set();

        try {
          const environments = getVisibleEnvironments();
          environments.forEach((env) => {
            const envKey = env?.key;
            if (!envKey) {
              return;
            }

            routes.add(envKey);

            if (
              env?.airConditioner !== null &&
              env?.airConditioner !== undefined
            ) {
              routes.add(`${envKey}-conforto`);
            }

            CONFIG_SUBPAGE_RULES.forEach(({ field, suffix }) => {
              const value = env?.[field];
              if (Array.isArray(value) && value.length > 0) {
                routes.add(`${envKey}-${suffix}`);
              }
            });
          });
        } catch (error) {
          console.warn("collectConfigDrivenRoutes falhou", error);
        }

        return Array.from(routes);
      }

      function prebuildConfigPages(pagesRef) {
        if (!pagesRef) {
          return Promise.resolve();
        }

        const scheduleIdle =
          typeof window.requestIdleCallback === "function"
            ? window.requestIdleCallback.bind(window)
            : (callback, options) =>
                window.setTimeout(
                  () =>
                    callback({
                      didTimeout: false,
                      timeRemaining: () => 0,
                    }),
                  Number(options?.timeout) || 1,
                );

        return new Promise((resolve) => {
          scheduleIdle(
            () => {
              try {
                const routes = collectConfigDrivenRoutes();
                let processed = 0;
                const total = routes.length;

                if (typeof window.updateProgress === "function") {
                  window.updateProgress(5, `Preparando ${total} Páginas...`);
                }

                const processChunk = () => {
                  const chunkSize = 3;
                  const start = processed;
                  const end = Math.min(start + chunkSize, routes.length);

                  for (let i = start; i < end; i++) {
                    const route = routes[i];

                    if (typeof ensureConfigPage === "function") {
                      ensureConfigPage(route, pagesRef);
                    }

                    if (
                      typeof pagesRef[route] !== "function" ||
                      pageCache.has(route)
                    ) {
                      continue;
                    }

                    const template = document.createElement("template");
                    template.innerHTML = pagesRef[route]();
                    pageCache.set(route, template.content);

                    const envMatch = /^[a-z]+\d+$/.test(route) ? route : null;
                    if (envMatch) {
                      preloadRoomBackground(route);
                    }
                  }

                  processed = end;

                  if (
                    typeof window.updateProgress === "function" &&
                    total > 0
                  ) {
                    const progress = 5 + Math.round((processed / total) * 10);
                    window.updateProgress(
                      progress,
                      `Página ${processed}/${total}`,
                    );
                  }

                  if (processed < routes.length) {
                    scheduleIdle(processChunk, { timeout: 100 });
                  } else {
                    if (typeof window.updateProgress === "function") {
                      window.updateProgress(15, "Páginas prontas!");
                    }
                    resolve();
                  }
                };

                processChunk();
              } catch (error) {
                console.warn("prebuildConfigPages falhou", error);
                resolve();
              }
            },
            { timeout: 50 },
          );
        });
      }

      const APP_INFO_VERSION_FALLBACK = "1.0";

      const APP_INFO_VISIBLE_CLASS = "is-visible";

      const appInfoOverlay = document.getElementById("app-info-overlay");

      const appInfoVersionLabel = document.getElementById("app-info-version");

      const appInfoLogo = document.getElementById("app-info-logo");

      const fullscreenToggleBtn = document.getElementById(
        "app-fullscreen-toggle",
      );
      const cacheClearBtn = document.getElementById("app-cache-clear");
      const instagramLink = document.getElementById("app-instagram-link");
      const supportLink = document.getElementById("app-support-link");

      let appInfoReturnFocusElement = null;

      let fullscreenListenersBound = false;

      function resolveAppInfoVersion() {
        try {
          if (
            typeof CLIENT_CONFIG === "object" &&
            CLIENT_CONFIG &&
            typeof CLIENT_CONFIG.clientInfo === "object" &&
            CLIENT_CONFIG.clientInfo &&
            CLIENT_CONFIG.clientInfo.version
          ) {
            return String(CLIENT_CONFIG.clientInfo.version);
          }
        } catch (_err) {
          // ignore
        }

        return APP_INFO_VERSION_FALLBACK;
      }

      function updateAppInfoVersion() {
        if (appInfoVersionLabel) {
          appInfoVersionLabel.textContent = "v" + resolveAppInfoVersion();
        }
      }

      function resolveAppInfoConfig() {
        try {
          if (typeof window.getAppInfoConfig === "function") {
            return window.getAppInfoConfig();
          }

          if (typeof CLIENT_CONFIG === "object" && CLIENT_CONFIG) {
            return CLIENT_CONFIG.appInfo || {};
          }
        } catch (_err) {
          // ignore
        }

        return {};
      }

      function applyOptionalAppInfoLink(linkElement, linkConfig, fallbackLabel) {
        if (!linkElement) return;

        const url =
          typeof linkConfig?.url === "string" ? linkConfig.url.trim() : "";
        const enabled = linkConfig?.enabled !== false && Boolean(url);

        if (!enabled) {
          linkElement.hidden = true;
          linkElement.setAttribute("aria-hidden", "true");
          linkElement.setAttribute("tabindex", "-1");
          linkElement.removeAttribute("href");
          return;
        }

        const label =
          typeof linkConfig?.label === "string" && linkConfig.label.trim()
            ? linkConfig.label.trim()
            : fallbackLabel;

        linkElement.hidden = false;
        linkElement.removeAttribute("aria-hidden");
        linkElement.removeAttribute("tabindex");
        linkElement.href = url;
        linkElement.setAttribute("aria-label", label);
      }

      function updateAppInfoBranding() {
        const appInfo = resolveAppInfoConfig();
        const logo = appInfo.logo || {};

        if (appInfoLogo) {
          const logoSrc = typeof logo.src === "string" ? logo.src.trim() : "";
          const logoAlt = typeof logo.alt === "string" ? logo.alt.trim() : "";

          if (logoSrc) {
            appInfoLogo.src = logoSrc;
          }

          if (logoAlt) {
            appInfoLogo.alt = logoAlt;
          }
        }

        const links = appInfo.links || {};
        applyOptionalAppInfoLink(instagramLink, links.instagram, "Instagram");
        applyOptionalAppInfoLink(supportLink, links.support, "Contato");
      }

      function openAppInfoMenu() {
        if (!appInfoOverlay) return;

        appInfoReturnFocusElement =
          document.activeElement instanceof HTMLElement
            ? document.activeElement
            : null;

        appInfoOverlay.classList.add(APP_INFO_VISIBLE_CLASS);

        appInfoOverlay.setAttribute("aria-hidden", "false");

        document.body.classList.add("app-info-open");

        updateFullscreenOptionLabel();

        const dialog = appInfoOverlay.querySelector(".app-info-dialog");

        if (dialog && typeof dialog.focus === "function") {
          dialog.setAttribute("tabindex", "-1");

          try {
            dialog.focus({ preventScroll: true });
          } catch (err) {
            dialog.focus();
          }
        }
      }

      function closeAppInfoMenu() {
        if (!appInfoOverlay) return;

        appInfoOverlay.classList.remove(APP_INFO_VISIBLE_CLASS);

        appInfoOverlay.setAttribute("aria-hidden", "true");

        document.body.classList.remove("app-info-open");

        if (
          appInfoReturnFocusElement &&
          typeof appInfoReturnFocusElement.focus === "function"
        ) {
          appInfoReturnFocusElement.focus();
        }
      }

      function isFullscreenActive() {
        return Boolean(
          document.fullscreenElement ||
          document.webkitFullscreenElement ||
          document.msFullscreenElement,
        );
      }

      function updateFullscreenOptionLabel() {
        if (!fullscreenToggleBtn) return;

        const label = fullscreenToggleBtn.querySelector(
          ".app-info-option__label",
        );

        if (!label) return;

        const isActive = isFullscreenActive();

        const labelText = isActive
          ? "Sair do modo tela cheia"
          : "Ativar tela cheia";

        label.textContent = labelText;
        fullscreenToggleBtn.setAttribute("aria-label", labelText);
      }

      function toggleFullscreen() {
        const doc = document;
        const docEl = doc.documentElement;
        const active = isFullscreenActive();

        let action;

        if (!active) {
          const request =
            docEl.requestFullscreen ||
            docEl.webkitRequestFullscreen ||
            docEl.msRequestFullscreen;

          if (!request) {
            console.warn("Fullscreen API indisponivel neste navegador.");
            closeAppInfoMenu();
            updateFullscreenOptionLabel();
            return;
          }

          action = request.call(docEl);
        } else {
          const exit =
            doc.exitFullscreen ||
            doc.webkitExitFullscreen ||
            doc.msExitFullscreen;

          if (!exit) {
            closeAppInfoMenu();
            updateFullscreenOptionLabel();
            return;
          }

          action = exit.call(doc);
        }

        closeAppInfoMenu();

        if (action && typeof action.then === "function") {
          action.catch(() => {}).finally(updateFullscreenOptionLabel);
        } else {
          updateFullscreenOptionLabel();
        }
      }

      function onFullscreenToggleClick(event) {
        event.preventDefault();
        toggleFullscreen();
      }

      function onCacheClearClick(event) {
        event.preventDefault();

        closeAppInfoMenu();

        if (typeof window.brutalCacheClear === "function") {
          window.brutalCacheClear();
        } else {
          console.warn("Funcao brutalCacheClear indisponivel.");
        }
      }

      window.toggleFullscreen = toggleFullscreen;

      function handleAppLogoTrigger(event) {
        event.preventDefault();

        openAppInfoMenu();
      }

      function setupAppInfoMenu() {
        document.querySelectorAll(".app-logo-trigger").forEach((trigger) => {
          trigger.removeEventListener("click", handleAppLogoTrigger);

          trigger.addEventListener("click", handleAppLogoTrigger);
        });
      }

      function initializeAppInfoMenu() {
        if (!appInfoOverlay) return;

        if (appInfoOverlay.dataset.ready === "true") return;

        appInfoOverlay.dataset.ready = "true";

        updateAppInfoBranding();
        updateAppInfoVersion();

        appInfoOverlay.addEventListener("click", (event) => {
          if (event.target === appInfoOverlay) {
            closeAppInfoMenu();
          }
        });

        const closeBtn = appInfoOverlay.querySelector(".app-info-close");

        if (closeBtn) {
          closeBtn.addEventListener("click", closeAppInfoMenu);
        }

        if (fullscreenToggleBtn) {
          fullscreenToggleBtn.removeEventListener(
            "click",
            onFullscreenToggleClick,
          );

          fullscreenToggleBtn.addEventListener(
            "click",
            onFullscreenToggleClick,
          );

          updateFullscreenOptionLabel();
        }

        if (cacheClearBtn) {
          cacheClearBtn.removeEventListener("click", onCacheClearClick);
          cacheClearBtn.addEventListener("click", onCacheClearClick);
        }
        if (instagramLink) {
          instagramLink.removeEventListener("click", closeAppInfoMenu);
          instagramLink.addEventListener("click", closeAppInfoMenu);
        }

        if (supportLink) {
          supportLink.removeEventListener("click", closeAppInfoMenu);
          supportLink.addEventListener("click", closeAppInfoMenu);
        }

        if (!fullscreenListenersBound) {
          [
            "fullscreenchange",
            "webkitfullscreenchange",
            "mozfullscreenchange",
