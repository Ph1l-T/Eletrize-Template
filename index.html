      };

      // Remover Páginas estáticas antigas para forçar geração via config.js
      const LEGACY_CONFIG_ROUTES = [
        "ambiente1-musica",
        "ambiente2-musica",
        "ambiente3-musica",
        "ambiente1-tv",
        "ambiente1-htv",
        "ambiente7-tv",
        "ambiente7-htv",
        "ambiente8-tv",
        "ambiente8-htv",
        "ambiente9-tv",
        "ambiente9-htv",
      ];

      LEGACY_CONFIG_ROUTES.forEach((route) => {
        if (pages[route]) {
          delete pages[route];
        }
      });

      Object.keys(pages).forEach((route) => {
        if (/^ambiente\d+-conforto$/.test(route)) {
          delete pages[route];
        }
      });

      let prebuildPromise = null;
      function startPrebuild() {
        if (prebuildPromise) return prebuildPromise;
        prebuildPromise = prebuildConfigPages(pages).catch((error) => {
          console.warn("Prebuild background falhou", error);
        });
        return prebuildPromise;
      }

      function schedulePrebuild() {
        const run = () => {
          startPrebuild();
        };

        if (typeof window.requestIdleCallback === "function") {
          window.requestIdleCallback(run, { timeout: 1800 });
          return;
        }

        setTimeout(run, 1200);
      }

      let mainHomeRuntime = null;
      let mainHomeRuntimeInitialized = false;

      function extractEnvironmentRoute(route) {
        const normalized = String(route || "")
          .trim()
          .toLowerCase();
        const match = normalized.match(/^(ambiente\d+)/);
        return match ? match[1] : null;
      }

      function rememberLastEnvironmentRoute(route) {
        const envRoute = extractEnvironmentRoute(route);
        if (!envRoute) return;
        try {
          localStorage.setItem("lastEnvironmentRoute", envRoute);
        } catch (error) {}
      }

      function createMainHomeRuntimeInstance() {
        if (
          !window.MainHomeKit ||
          typeof window.MainHomeKit.createMainHomeRuntime !== "function"
        ) {
          return null;
        }

        const weatherConfig =
          typeof getWeatherConfig === "function"
            ? getWeatherConfig()
            : {
                city: "Ribeirao Preto",
                latitude: -21.1775,
                longitude: -47.8103,
                timezone: "America/Sao_Paulo",
                refreshMinutes: 15,
              };

        const mainDashboardConfig =
          typeof getMainDashboardConfig === "function"
            ? getMainDashboardConfig()
            : {
                nowPlayingDeviceId: "",
                controls: {
                  transportDeviceId: "",
                  audioDeviceId: "",
                  commands: {
                    play: "play",
                    pause: "pause",
                    next: "nextTrack",
                    previous: "previousTrack",
                    mute: "mute",
                    unmute: "unmute",
                  },
                },
                previewNowPlaying: {
                  enabled: false,
                  status: "playing",
                  track: "Blinding Lights",
                  artist: "The Weeknd",
                  album: "After Hours",
                  artwork: "assets/images/music-placeholder.png",
                  muted: false,
                },
              };

        return window.MainHomeKit.createMainHomeRuntime({
          config: {
            weather: weatherConfig,
            mainDashboard: mainDashboardConfig,
          },
          adapters: {
            getStoredState(deviceId) {
              if (typeof window.getStoredState === "function") {
                return window.getStoredState(String(deviceId));
              }
              try {
                return localStorage.getItem(`deviceState:${String(deviceId)}`);
              } catch (error) {
                return null;
              }
            },
            setStoredState(deviceId, state) {
              if (typeof window.setStoredState === "function") {
                window.setStoredState(String(deviceId), String(state));
                return;
              }
              try {
                localStorage.setItem(
                  `deviceState:${String(deviceId)}`,
                  String(state),
                );
              } catch (error) {}
            },
            async sendCommand(deviceId, command, value) {
              if (typeof window.sendHubitatCommand === "function") {
                return window.sendHubitatCommand(
                  String(deviceId),
                  String(command),
                  value,
                );
              }
              const params = new URLSearchParams({
                device: String(deviceId),
                command: String(command),
              });
              if (value !== undefined && value !== null && value !== "") {
                params.set("value", String(value));
              }
              const response = await fetch(
                `/hubitat-proxy?${params.toString()}`,
                {
                  method: "GET",
                  cache: "no-store",
                },
              );
              if (!response.ok) {
                throw new Error(`sendCommand HTTP ${response.status}`);
              }
              return null;
            },
            async pollDevice(deviceId) {
              const shouldBypassHubitat =
                (typeof window.isHubitatBypassMode === "function" &&
                  window.isHubitatBypassMode()) ||
                (typeof window.isCinematicModeEnabled === "function" &&
                  window.isCinematicModeEnabled());

              if (shouldBypassHubitat) {
                const ids = String(deviceId || "")
                  .split(",")
                  .map((id) => String(id || "").trim())
                  .filter(Boolean);

                const devices = ids.reduce((acc, id) => {
                  let state = "off";

                  if (typeof window.getStoredState === "function") {
                    state = String(window.getStoredState(id) || "off");
                  } else {
                    try {
                      const rawState = localStorage.getItem(`deviceState:${id}`);
                      state = rawState ? String(rawState) : "off";
                    } catch (error) {
                      state = "off";
                    }
                  }

                  acc[id] = {
                    id,
                    success: true,
                    state,
                    switch: state,
                    attributes: {
                      switch: state,
                    },
                  };

                  return acc;
                }, {});

                return {
                  success: true,
                  devices,
                  data: Object.values(devices),
                };
              }

              const response = await fetch(
                `/polling?devices=${encodeURIComponent(String(deviceId))}`,
                {
                  method: "GET",
                  cache: "no-store",
                },
              );
              if (!response.ok) {
                throw new Error(`pollDevice HTTP ${response.status}`);
              }
              return response.json();
            },
            navigate(route) {
              if (typeof window.spaNavigate === "function") {
                window.spaNavigate(String(route || ""));
                return;
              }
              window.location.hash = `#${String(route || "")}`;
            },
            getVisibleEnvironments() {
              if (typeof window.getVisibleEnvironments === "function") {
                return window.getVisibleEnvironments();
              }
              return [];
            },
            getEnvironmentPhotoMap() {
              const rawMap =
                typeof window.getEnvironmentPhotoMap === "function"
                  ? window.getEnvironmentPhotoMap()
                  : {};
              return Object.entries(rawMap || {}).reduce(
                (acc, [envKey, photo]) => {
                  const path = String(photo || "").trim();
                  if (!path) return acc;
                  acc[envKey] =
                    path.includes("/") || path.includes("\\")
                      ? path
                      : `images/Images/${path}`;
                  return acc;
                },
                {},
              );
            },
          },
        });
      }

      function mountMainHomeRuntime() {
        if (!mainHomeRuntime) {
          mainHomeRuntime = createMainHomeRuntimeInstance();
          mainHomeRuntimeInitialized = false;
        }

        if (!mainHomeRuntime) return;

        if (!mainHomeRuntimeInitialized) {
          if (typeof mainHomeRuntime.init === "function") {
            mainHomeRuntime.init();
            mainHomeRuntimeInitialized = true;
          }
          return;
        }

        if (typeof mainHomeRuntime.resume === "function") {
          mainHomeRuntime.resume();
          return;
        }

        if (typeof mainHomeRuntime.refreshAll === "function") {
          mainHomeRuntime.refreshAll(true).catch(() => {});
        }
      }

      function unmountMainHomeRuntime() {
        if (!mainHomeRuntime) return;
        if (!mainHomeRuntimeInitialized) return;

        if (typeof mainHomeRuntime.suspend === "function") {
          try {
            mainHomeRuntime.suspend();
          } catch (error) {}
          return;
        }

        if (typeof mainHomeRuntime.destroy === "function") {
          try {
            mainHomeRuntime.destroy();
          } catch (error) {}
        }
        mainHomeRuntime = null;
        mainHomeRuntimeInitialized = false;
      }

      window.refreshMainHomeRuntime = function (forceWeather) {
        if (!mainHomeRuntime) {
          return Promise.resolve(false);
        }

        if (typeof mainHomeRuntime.refreshAll === "function") {
          return Promise.resolve(
            mainHomeRuntime.refreshAll(forceWeather === true),
          )
            .then(() => true)
            .catch(() => false);
        }

        if (typeof mainHomeRuntime.resume === "function") {
          try {
            mainHomeRuntime.resume();
            return Promise.resolve(true);
          } catch (error) {
            return Promise.resolve(false);
          }
        }

        return Promise.resolve(false);
      };

      let SPA_NAV_LOCK_UNTIL = 0;
      const SPA_NAV_LOCK_MS = 140;
      const SPA_NAV_TRANSITION_MS = 90;

      function resolveAccessibleSpaRoute(route) {
        try {
          const accessApi = window.dashboardAccess;
          if (
            accessApi &&
            typeof accessApi.resolveAccessibleRoute === "function"
          ) {
            return accessApi.resolveAccessibleRoute(route);
          }
        } catch (error) {}
        return String(route || "").trim();
      }

      function spaNavigate(page) {
        const now = Date.now();
        if (now < SPA_NAV_LOCK_UNTIL) return;
        SPA_NAV_LOCK_UNTIL = now + SPA_NAV_LOCK_MS;

        const target = resolveAccessibleSpaRoute(page);
        rememberLastEnvironmentRoute(target);
        const current = (window.location.hash || "").replace("#", "");
        if (!target || target === current) {
          window.location.hash = target;
          return;
        }

        // Fade-out da Página atual sem esconder instantaneamente
        const activePage = document.querySelector(".page.active");
        if (activePage) {
          activePage.classList.add("page-leaving");
        }

        // Trocar o hash após um pequeno atraso para a animação aparecer
        setTimeout(() => {
          window.__SPA_NAV_PREFADED__ = true;
          window.location.hash = target;
        }, SPA_NAV_TRANSITION_MS);
      }

      function getEnvironmentLabel(envKey) {
        if (typeof getEnvironment === "function") {
          const env = getEnvironment(envKey);
          return env?.name || null;
        }
        return null;
      }

      const PAGE_SUFFIX_LABELS = {
        "": "Painel",
        luzes: "Ilumina\u00e7\u00e3o",
        cortinas: "Cortinas",
        conforto: "Conforto",
        musica: "M\u00fasica",
        piscina: "Piscina",
        "piscina-luzes": "Ilumina\u00e7\u00e3o",
      };

      function formatEnvironmentPageTitle(route) {
        if (!route || !route.startsWith("ambiente")) return null;
        const parts = route.split("-");
        const envKey = parts[0];
        const suffix = parts.slice(1).join("-");
        const envLabel = getEnvironmentLabel(envKey);
        if (!envLabel) return null;
        const suffixKey = String(suffix || "").toLowerCase();
        let pageLabel = "";

        if (suffixKey && REMOTE_CONTROL_TYPES.has(suffixKey)) {
          pageLabel = resolveRemoteControlHeading(
            suffixKey,
            suffixKey.toUpperCase(),
          );
        } else if (
          Object.prototype.hasOwnProperty.call(PAGE_SUFFIX_LABELS, suffixKey)
        ) {
          pageLabel = PAGE_SUFFIX_LABELS[suffixKey];
        } else if (suffixKey) {
          pageLabel = suffixKey
            .split("-")
            .map((segment) =>
              segment ? segment[0].toUpperCase() + segment.slice(1) : segment,
            )
            .join(" ");
        } else {
          pageLabel = PAGE_SUFFIX_LABELS[""];
        }
        return `${envLabel} | ${pageLabel}`;
      }

      function splitPageTitleText(text) {
        const raw = String(text || "").trim();
        if (!raw) return null;
        if (raw.includes("|")) {
          const parts = raw.split("|");
          const primary = parts.shift().trim();
          const secondary = parts.join("|").trim();
          return secondary ? { primary, secondary, separator: "|" } : null;
        }
        const commaIndex = raw.indexOf(",");
        if (commaIndex >= 0) {
          const primary = raw.slice(0, commaIndex).trim();
          const secondary = raw.slice(commaIndex + 1).trim();
          return secondary ? { primary, secondary, separator: "," } : null;
        }
        return null;
      }

      function applyPageTitleLayout(titleEl, rawText) {
        if (!titleEl) return;
        const text = String(rawText || "").trim();
        if (!text) return;
        if (titleEl.dataset.splitTitle === text) return;

        const parts = splitPageTitleText(text);
        titleEl.dataset.splitTitle = text;
        titleEl.classList.toggle("page-title--split", Boolean(parts));

        if (!parts) {
          titleEl.textContent = text;
          return;
        }

        titleEl.textContent = "";
        const primary = document.createElement("span");
        primary.className = "page-title__primary";
        primary.textContent = parts.primary;

        const secondary = document.createElement("span");
        secondary.className = "page-title__secondary";
        secondary.dataset.separator = parts.separator;
        secondary.textContent = parts.secondary;

        titleEl.append(primary, secondary);
      }

      function renderSpa() {
        let page = window.location.hash.replace("#", "") || "home";
        const resolvedPage = resolveAccessibleSpaRoute(page || "home");
        if (resolvedPage && resolvedPage !== page) {
          window.location.hash = resolvedPage;
          return;
        }
        page = resolvedPage || page;

        if (!pages[page] && typeof ensureConfigPage === "function") {
          ensureConfigPage(page, pages);
        }

        if (!pages[page]) {
          page = resolveAccessibleSpaRoute("home") || "home";
        }
        rememberLastEnvironmentRoute(page);

        // Navbar pages: manter logo + linha branca estáticos fora do fade.
        // Páginas internas: esconder para não conflitar com headers/back buttons.
        try {
          const staticTopbar = document.getElementById("spa-static-topbar");
          const staticHeader = document.getElementById("spa-static-header");
          const showStaticChrome =
            page === "home" ||
            page === "ambientes" ||
            page === "curtains" ||
            page === "scenes";
          if (staticTopbar)
            staticTopbar.classList.toggle("is-hidden", !showStaticChrome);
          if (staticHeader)
            staticHeader.classList.toggle("is-hidden", !showStaticChrome);
        } catch (e) {}

        const previousPage = spaRoot.dataset.currentPage;
        if (previousPage === "home" && page !== "home") {
          unmountMainHomeRuntime();
        }
        if (previousPage) {
          const fragment = document.createDocumentFragment();
          while (spaRoot.firstChild) {
            fragment.appendChild(spaRoot.firstChild);
          }
          pageCache.set(previousPage, fragment);
        } else {
          while (spaRoot.firstChild) {
            spaRoot.removeChild(spaRoot.firstChild);
          }
        }

        let fragmentToRender;
        let reused = false;

        if (pageCache.has(page)) {
          fragmentToRender = pageCache.get(page);
          pageCache.delete(page);
          reused = true;
        } else {
          const template = document.createElement("template");
          template.innerHTML = pages[page]();
          fragmentToRender = template.content;
        }

        while (spaRoot.firstChild) {
          spaRoot.removeChild(spaRoot.firstChild);
        }

        // Clean any lingering leaving states on cached fragments
        fragmentToRender
          .querySelectorAll?.(".page-leaving")
          .forEach((el) => el.classList.remove("page-leaving"));

        spaRoot.appendChild(fragmentToRender);
        spaRoot.dataset.currentPage = page;

        // Se a Página veio do cache, ela pode estar com page-ready ainda.
        // Remover imediatamente evita aparecer 1 frame (flash) antes do applyBackground rodar.
        try {
          const justRendered = spaRoot.querySelector(".page.active");
          if (justRendered) {
            justRendered.classList.remove("page-ready");
          }
        } catch (e) {}

        const formattedTitle = formatEnvironmentPageTitle(page);
        if (formattedTitle) {
          document.title = formattedTitle;
          const activePage = document.querySelector(".page.active");
          if (activePage) {
            let titleEl = activePage.querySelector(".page-title");
            if (!titleEl) {
              const headerEl = activePage.querySelector(".page-header");
              if (headerEl) {
                titleEl = document.createElement("h1");
                titleEl.className = "page-title";
                headerEl.appendChild(titleEl);
              }
            }
            if (titleEl) {
              applyPageTitleLayout(titleEl, formattedTitle);
            }
          }
        } else {
          // Para Páginas não-ambiente, tentar atualizar título simples
          const activePage = document.querySelector(".page.active");
          if (activePage) {
            const titleEl = activePage.querySelector(".page-title");
            const rawTitle =
              titleEl?.dataset?.splitTitle || titleEl?.textContent || "";
            if (titleEl && rawTitle) {
              applyPageTitleLayout(titleEl, rawTitle);
              document.title = rawTitle + " | Dashboard Cliente";
            }
          }
        }

        setupAppInfoMenu();

        // Inicializar slider de volume se estiver na p?gina de controle remoto
        if (document.getElementById("tv-volume-slider")) {
          setTimeout(() => {
            if (typeof initVolumeSlider === "function") {
              initVolumeSlider();
            }
          }, 100);
        }

        // Constrói a lista de cômodos na Página Ambientes

        if (page === "ambientes") {
          const list = document.querySelector(".rooms-list");

          if (list && !reused) {
            const rooms =
              typeof getHomeRoomsData === "function"
                ? getHomeRoomsData()
                : [
                    { name: "Varanda", route: "ambiente1" },
                    { name: "Living", route: "ambiente2" },
                    { name: "Piscina", route: "ambiente3" },
                    { name: "Externa", route: "ambiente4" },
                    { name: "Serviço", route: "ambiente5" },
                    { name: "Circulação", route: "ambiente6" },
                    { name: "Suíte I", route: "ambiente7" },
                    { name: "Suíte II", route: "ambiente8" },
                    { name: "Suíte Master", route: "ambiente9" },
                  ];

            const order =
              typeof getHomeRoomsData === "function"
                ? rooms.map((r) => r.route)
                : [
                    "ambiente1",
                    "ambiente2",
                    "ambiente3",
                    "ambiente4",
                    "ambiente5",
                    "ambiente6",
                    "ambiente7",
                    "ambiente8",
                    "ambiente9",
                  ];

            const visible =
              typeof getHomeRoomsData === "function"
                ? rooms
                : rooms
                    .filter((r) => order.includes(r.route))
                    .sort(
                      (a, b) => order.indexOf(a.route) - order.indexOf(b.route),
                    );

            const firstVisibleRoute = visible[0]?.route || null;

            // Os deviceIds já vêm do config.js via getHomeRoomsData()
            // Não há mais fallback hardcoded - use apenas os IDs configurados

            list.innerHTML = visible
              .map((r) => {
                const hasPhoto = Boolean(ROOM_IMAGE_DATA[r.route]);
                const envConfig =
                  typeof getEnvironment === "function"
                    ? getEnvironment(r.route)
                    : null;
                const quickActions = Array.isArray(envConfig?.quickActions)
                  ? envConfig.quickActions
                  : [];
                const lightAction = quickActions.find(
                  (action) =>
                    String(action?.type || "").toLowerCase() === "lights",
                );
                return `

                    <div class="room-card ${hasPhoto ? "has-photo" : ""}">

                        ${
                          hasPhoto
                            ? renderRoomResponsivePhoto(r.route, r.name, {
                                eager: r.route === firstVisibleRoute,
                              })
                            : ""
                        }

                        <span>${r.name}</span>

                        ${
                          lightAction
                            ? `<button class="room-master-btn" data-route="${
                                r.route
                              }" data-action="lights" data-icon-on="${uiToggleIcon(
                                "light",
                                "on",
                                "images/icons/icon-small-light-on.svg",
                              )}" data-icon-off="${uiToggleIcon(
                                "light",
                                "off",
                                "images/icons/icon-small-light-off.svg",
                              )}" onclick="onHomeMasterClick(event,this)" aria-label="Luzes">
                                <img class="room-master-icon" src="${uiToggleIcon(
                                  "light",
                                  "off",
                                  "images/icons/icon-small-light-off.svg",
                                )}" alt="Luzes">
                              </button>`
                            : ""
                        }

                        <button class="room-card-link" onclick="spaNavigate('${
                          r.route
                        }')"></button>

                    </div>`;
              })
              .join("");

            list.dataset.rendered = "true";
          }

          if (typeof syncHomeLightButtons === "function") {
            syncHomeLightButtons();
          }
        }

        // Define o fundo da Página interna com a mesma foto do card

        (function setPageBackground(route) {
          // Extrai o ambiente base (ex: "ambiente1" de "ambiente1-luzes")
          const baseAmbiente = route.match(/^(ambiente\d+)/)?.[1] || route;
          const container =
            document.querySelector(".page.active .page-container") ||
            document.querySelector(".page.active.page-container");

          if (container) {
            applyBackground(container, baseAmbiente);
          } else {
            const fallbackContainer = document.querySelector(".page.active");
            if (
              fallbackContainer &&
              !fallbackContainer.classList.contains("page-ready")
            ) {
              requestAnimationFrame(() => {
                fallbackContainer.classList.add("page-ready");
              });
            }
          }

          preloadRoomBackground(baseAmbiente);
        })(page);

        // Atualiza BottomNav (config.js)
        renderBottomNav(page);

        // Inicializa botões dos cômodos nas Páginas internas

        if (
          [
            "ambiente1",
            "ambiente2",
            "ambiente3",
            "ambiente4",
            "ambiente5",
            "ambiente6",
            "ambiente7",
            "ambiente8",
            "ambiente9",
          ].includes(page)
        ) {
          if (typeof initRoomPage === "function") initRoomPage();
        }

        // Atualiza o botão master na Página de cenários

        if (page === "scenes" || page === "scenes-criar") {
          ensureScenesScript()
            .then(() => {
              if (typeof initScenesPage === "function") {
                initScenesPage();
              }
            })
            .catch((error) =>
              console.error("Erro ao carregar scenes.js", error),
            );
        }

        if (page === "scenes" || page === "routines-criar") {
          ensureRoutinesScript()
            .then(() => {
              if (typeof initRoutinesPage === "function") {
                initRoutinesPage();
              }
            })
            .catch((error) =>
              console.error("Erro ao carregar routines.js", error),
            );
        }

        // Inicializa controlador de ar condicionado em Páginas *-conforto
        if (/^ambiente\d+-conforto$/.test(page)) {
          setTimeout(() => {
            if (typeof initAirConditionerControl === "function") {
              initAirConditionerControl();
            }
          }, 100);
        }

        // Inicializa player de música em Páginas *-musica geradas pelo config
        if (/^ambiente\d+-musica$/.test(page)) {
          setTimeout(() => {
            if (typeof initMusicPlayerUI === "function") {
              initMusicPlayerUI();
            }
          }, 100);
        }

        if (page === "home") {
          mountMainHomeRuntime();
        }
      }

      // Home: Master On/Off por ambiente (funções movidas para script.js)

      window.onHomeMasterClick = function (ev, btn) {
        ev.stopPropagation();

        ev.preventDefault();

        // Verificar se já tem comando pendente

        if (btn.dataset.pending === "true") {
          console.log("🚫 Comando master já em andamento");

          return;
        }

        const ids = (btn.dataset.deviceIds || "").split(",").filter(Boolean);

        if (!ids.length) return;

        const shouldTurnOn = !anyOn(ids);

        const cmd = shouldTurnOn ? "on" : "off";

        console.log(`Master ${cmd} para ${ids.length} dispositivos:`, ids);

        // Marcar botão como pendente

        btn.dataset.pending = "true";

        // Atualizar visual imediatamente (forçar update)

        const img = btn.querySelector("img");

        if (img) {
          img.src = shouldTurnOn
            ? "images/icons/icon-small-light-on.svg"
            : "images/icons/icon-small-light-off.svg";

          btn.dataset.state = cmd;
        }

        // Proteger todos os dispositivos individuais para evitar conflitos

        ids.forEach((deviceId) => {
          if (typeof protectDevice === "function") {
            protectDevice(deviceId, 10000); // 10s de proteção para master commands
          }
        });

        // Atualizar estados salvos imediatamente

        ids.forEach((id) => {
          setStoredState(id, cmd);
        });

        // Atualizar UI imediatamente

        if (typeof updateStatesAfterMasterCommand === "function") {
          updateStatesAfterMasterCommand(ids, cmd);
        }

        // Enviar comandos para todos os dispositivos

        const promises = ids.map((id) => sendHubitatCommand(id, cmd));

        Promise.allSettled(promises)
          .then((results) => {
            const successes = results.filter(
              (r) => r.status === "fulfilled",
            ).length;

            const failures = results.filter(
              (r) => r.status === "rejected",
            ).length;

            console.log(
              `Master ${cmd}: ${successes} sucessos, ${failures} falhas`,
            );

            // Segunda sincronização após comandos completos

            setTimeout(() => {
              if (typeof updateStatesAfterMasterCommand === "function") {
                updateStatesAfterMasterCommand(ids, cmd);
              }
            }, 300);

            // Remover proteção após delay

            setTimeout(() => {
              btn.dataset.pending = "false";

              console.log(`🔓 Master button liberado`);
            }, 3000);
          })
          .catch((error) => {
            console.error("❌ Erro no comando master:", error);

            btn.dataset.pending = "false";
          });
      };

      // Função para recalcular posição do page selector

      function updatePageSelectorPosition() {
        const currentRoute = window.location.hash.replace("#", "") || "home";

        renderBottomNav(currentRoute);
      }

      // Navegação com transição (inclui back/forward do browser, que não passa por spaNavigate)
      let SPA_HASHCHANGE_TIMER = null;
      window.addEventListener("hashchange", () => {
        if (SPA_HASHCHANGE_TIMER) {
          clearTimeout(SPA_HASHCHANGE_TIMER);
          SPA_HASHCHANGE_TIMER = null;
        }

        // Se a navegação já fez fade antes (spaNavigate), renderiza direto.
        if (window.__SPA_NAV_PREFADED__) {
          window.__SPA_NAV_PREFADED__ = false;
          renderSpa();
          return;
        }

        const activePage = document.querySelector(".page.active");
        if (activePage) {
          activePage.classList.add("page-leaving");
        }

        SPA_HASHCHANGE_TIMER = setTimeout(() => {
          renderSpa();
          SPA_HASHCHANGE_TIMER = null;
        }, SPA_NAV_TRANSITION_MS);
      });

      window.addEventListener("DOMContentLoaded", () => {
        initializeAppInfoMenu();

        const runSpaBootstrap = () => {
          renderSpa();
          schedulePrebuild();

          // Fail-safe: se o script principal nao iniciar por algum motivo,
          // tenta inicializar e/ou remove o loader para nao travar a UI.
          setTimeout(() => {
            try {
              if (
                !window.initializationStarted &&
                typeof window.initializeApp === "function"
              ) {
                window.initializeApp();
              }

              const loader = document.getElementById("global-loader");
              if (
                !window.initializationStarted &&
                loader &&
                loader.style.display !== "none"
              ) {
                const loaderText = document.querySelector(".loader-text");
                if (loaderText) loaderText.textContent = "Inicializando...";

                // Ultimo recurso: esconder loader apos alguns segundos
                setTimeout(() => {
                  if (
                    !window.appFullyInitialized &&
                    loader &&
                    loader.style.display !== "none"
                  ) {
                    if (typeof window.hideLoader === "function") {
                      window.hideLoader();
                    } else if (
                      typeof window.startHomeAnimation === "function"
                    ) {
                      window.startHomeAnimation();
                    } else {
                      loader.classList.add("hidden");
                      loader.style.display = "none";
                      document.body.classList.add("app-ready");
                    }
                  }
                }, 6000);
              }
            } catch (e) {
              // Silenciar falhas do fail-safe
              document.body.classList.add("app-ready");
            }
          }, 800);
        };

        const authApi = window.dashboardAuth;
        const accessApi = window.dashboardAccess;
        const authEnabled =
          authApi && typeof authApi.isEnabled === "function"
            ? authApi.isEnabled()
            : false;
        const authAuthenticated =
          authApi && typeof authApi.isAuthenticated === "function"
            ? authApi.isAuthenticated()
            : true;

        if (
          authEnabled &&
          !authAuthenticated &&
          authApi &&
          typeof authApi.onAuthenticated === "function"
        ) {
          authApi.onAuthenticated(runSpaBootstrap);
          return;
        }

        if (
          accessApi &&
          typeof accessApi.canInitializeApp === "function" &&
          !accessApi.canInitializeApp() &&
          typeof accessApi.waitUntilReady === "function"
        ) {
          accessApi.waitUntilReady().then(runSpaBootstrap);
          return;
        }

        runSpaBootstrap();
      });

      // Listeners para recalcular page selector ao rotacionar/redimensionar

      window.addEventListener("resize", () => {
        // Debounce para evitar múltiplas chamadas

        clearTimeout(window.resizeTimeout);

        window.resizeTimeout = setTimeout(updatePageSelectorPosition, 100);
      });

      window.addEventListener("orientationchange", () => {
        // Aguardar um pouco após mudança de orientação para garantir layout correto

        setTimeout(updatePageSelectorPosition, 300);
      });

      window.addEventListener("dashboard-access-ready", () => {
        const currentRoute = window.location.hash.replace("#", "") || "home";
        renderBottomNav(currentRoute);
      });
    </script>
  </body>
</html>
